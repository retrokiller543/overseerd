name: Performance

# Statistical timing is intentionally isolated from pull-request CI: Criterion's optimized
# build is comparatively heavy and shared runners are noisy. PRs instead run deterministic
# allocation and liveness contracts through the normal workspace test job.
on:
  workflow_dispatch:
  schedule:
    - cron: "23 3 * * 1"

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  criterion:
    name: Criterion benchmarks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Cache benchmark artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "benchmarks -> target"
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Run DI hot-path benchmarks
        run: cargo bench --manifest-path benchmarks/Cargo.toml --bench di_hot_paths --locked
      - name: Store Criterion reports
        uses: actions/upload-artifact@v4
        with:
          name: criterion-reports-${{ github.run_id }}
          path: benchmarks/target/criterion
          retention-days: 90
