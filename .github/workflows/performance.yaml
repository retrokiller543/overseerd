name: Performance

# Statistical timing is intentionally isolated from pull-request CI: Criterion's optimized
# build is comparatively heavy and shared runners are noisy. PRs instead run deterministic
# allocation and liveness contracts through the normal workspace test job.
on:
  workflow_dispatch:
  schedule:
    - cron: "23 3 * * 1"

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  criterion:
    name: ${{ matrix.bench }}
    runs-on: ubuntu-latest
    # One job per bench: they run in parallel, a slow or failing bench is isolated, and each
    # uploads its own report artifact. Add a new bench to this list when you add one.
    strategy:
      fail-fast: false
      matrix:
        bench:
          - di_hot_paths
          - di_graph_memory
          - config_resolution
          - serde_abstraction
          - rpc_dispatch
          - ws_pubsub_fanout
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Cache benchmark artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "benchmarks -> target"
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Run ${{ matrix.bench }} benchmark
        run: cargo bench --manifest-path benchmarks/Cargo.toml --bench ${{ matrix.bench }}
      - name: Store Criterion reports
        uses: actions/upload-artifact@v4
        with:
          name: criterion-reports-${{ matrix.bench }}-${{ github.run_id }}
          path: benchmarks/target/criterion
          retention-days: 90
