name: Release-plz

# RELEASE_PLZ_TOKEN is an optional secret (fine-grained PAT with contents +
# pull-requests write, or a GitHub App token). It is used so the release PR is
# opened by a non-default identity: PRs opened by the built-in GITHUB_TOKEN do
# NOT trigger the `pull_request` CI workflow, so required status checks would
# never report and the release PR could never merge. With the token set, CI
# runs on the release PR (its check steps skip and report green instantly).
# If the secret is unset it falls back to GITHUB_TOKEN; in that case keep the
# CI checks advisory rather than required.

on:
  push:
    branches:
      - master

jobs:

  # Release unpublished packages.
  release-plz-release:
    name: Release-plz release
    runs-on: ubuntu-latest
    if: ${{ github.repository_owner == 'retrokiller543' }}
    permissions:
      contents: write
      pull-requests: read
    steps:
      - &checkout
        name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false
      - &install-rust
        name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Detect release commit
        id: release-commit
        shell: bash
        run: |
          if git log -1 --pretty=%B | grep -q 'chore: release'; then
            echo "publish=true" >> "$GITHUB_OUTPUT"
          else
            echo "publish=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Run release-plz
        # Only publish after the release PR itself is merged. Ordinary feature merges still run
        # the `release-plz-pr` job below to create/update the release PR.
        if: ${{ steps.release-commit.outputs.publish == 'true' }}
        uses: release-plz/action@v0.5
        with:
          command: release
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_PLZ_TOKEN || secrets.GITHUB_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  # Create a PR with the new versions and changelog, preparing the next release.
  release-plz-pr:
    name: Release-plz PR
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    concurrency:
      group: release-plz-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - *checkout
      - *install-rust
      - name: Run release-plz
        uses: release-plz/action@v0.5
        with:
          command: release-pr
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_PLZ_TOKEN || secrets.GITHUB_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
