[workspace]
members = [
    ".",
    "crates/analyze",
    "crates/core",
    "crates/macros",
    "crates/transport",
    "examples/daemon",
]
resolver = "3"

[workspace.package]
version = "0.1.0"
edition = "2024"
license = "MIT"
authors = ["Emil Schütt <emil.schutt@gmail.com>"]

[workspace.dependencies]
# Workspace member crates
overseer-core = { path = "crates/core" }
overseer-macros = { path = "crates/macros" }
overseer-transport = { path = "crates/transport" }

# Common dependencies
bitflags = "2"
tokio = { version = "1", features = ["full"] }
tokio-stream = "0.1"
tokio-util = "0.7"
futures = "0.3"
serde = { version = "1", features = ["derive"] }
postcard = { version = "1", features = ["use-std"] }
async-trait = "0.1"
linkme = "0.3"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
syn = { version = "2", features = ["full"] }
quote = "1"
proc-macro2 = "1"

[package]
name = "overseer"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true

[[bin]]
name = "example"
path = "src/bin/example.rs"

[features]
# Compile the generated client SDK and the client-side transport. Opt in via
# `overseer = { features = ["client"] }`; no feature is needed in the user crate.
client = [
    "overseer-macros/client",
    "overseer-core/client",
    "overseer-transport/client",
    "dep:async-trait",
]

[dependencies]
overseer-core = { workspace = true }
overseer-transport = { workspace = true }
overseer-macros = { workspace = true }
tokio = { workspace = true }
futures = { workspace = true }
serde = { workspace = true }
postcard = { workspace = true }
async-trait = { workspace = true, optional = true }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
clap = { version = "4", features = ["derive"] }
