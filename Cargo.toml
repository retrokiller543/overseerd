[workspace]
members = [
    ".",
    "crates/analyze",
    "crates/config",
    "crates/core",
    "crates/macros",
    "crates/transport",
    "examples/daemon",
]
resolver = "3"

[workspace.package]
version = "0.1.0"
edition = "2024"
license = "MIT"
authors = ["Emil Schütt <emil.schutt@gmail.com>"]

[workspace.dependencies]
# Workspace member crates
overseerd-config = { path = "crates/config" }
overseerd-core = { path = "crates/core" }
overseerd-macros = { path = "crates/macros" }
overseerd-transport = { path = "crates/transport" }

# Common dependencies
bitflags = "2"
thiserror = "2"
toml = "1.1"
serde_yaml_ng = "0.10"
directories = "6"
tokio = { version = "1", features = ["full"] }
tokio-stream = "0.1"
tokio-util = "0.7"
futures = "0.3"
serde = { version = "1", features = ["derive"] }
postcard = { version = "1", features = ["use-std"] }
async-trait = "0.1"
linkme = "0.3"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "fmt", "ansi", "json"] }
syn = { version = "2", features = ["full"] }
quote = "1"
proc-macro2 = "1"

[package]
name = "overseerd"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true

[features]
default = ["di-check"]

# Compile the generated client SDK and the client-side transport. Opt in via
# `overseerd = { features = ["client"] }`; no feature is needed in the user crate.
client = [
    "overseerd-macros/client",
    "overseerd-core/client",
    "overseerd-transport/client",
    "dep:async-trait",
]

# Emit compile-time dependency-injection checks (a `Wiring: Provide<Dep>` bound
# per concrete dependency). A missing provider becomes a `cargo check` error.
di-check = ["overseerd-macros/di-check", "overseerd-core/di-check"]

# Enable YAML config sources (`application.yaml`) alongside the default TOML.
yaml = ["overseerd-core/yaml"]

# Provide the `init_tracing` helper, pulling in `tracing-subscriber`.
tracing-subscriber = ["overseerd-core/tracing-subscriber"]

[dependencies]
overseerd-core = { workspace = true }
overseerd-transport = { workspace = true }
overseerd-macros = { workspace = true }
tokio = { workspace = true }
futures = { workspace = true }
serde = { workspace = true }
postcard = { workspace = true }
async-trait = { workspace = true, optional = true }
